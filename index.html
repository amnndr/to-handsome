<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Valentine Letter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <!-- Envelope Screen -->
    <div id="envelope-container">
      <img src="envelope.png" alt="Envelope" id="envelope" />
      <p>♡ Letter for You ♡</p>
    </div>

    <!-- Letter Screen -->
    <div id="letter-container">
      <div class="letter-window">
        <h1 id="letter-title">Will you go on a date with me????</h1>

        <img src="cat_heart.gif" class="cat" id="letter-cat" />

        <div class="buttons" id="letter-buttons">
          <img src="yes.png" class="btn yes-btn" alt="Yes" />

          <div class="no-wrapper">
            <img src="no.png" class="btn no-btn" alt="No" />
          </div>
        </div>

        <div id="final-text" class="final-text" style="display: none">
  <strong>Yay! Choose a slot:</strong>
  <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="pixel-btn" onclick="showMap('pavi-seats.jpg')">Pavi BJ (Deluxe) - 1:30 PM</button>
            <button class="pixel-btn" onclick="showMap('midvalley-seats.jpg')">Midvalley (Atmos) - 12:50 PM</button>
          </div>
        </div>
      </div>
    </div>

    <div id="image-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000;" onclick="this.style.display='none'">
        <img id="modal-img" src="" style="max-width:90%; max-height:80%; border:5px solid white;">
    </div>
     
    <script src="script.js"></script>
  </body>
</html>
