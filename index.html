<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Valentine Letter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <!-- Envelope Screen -->
    <div id="envelope-container">
      <img src="envelope.png" alt="Envelope" id="envelope" />
      <p>♡ Letter for You ♡</p>
    </div>

    <!-- Letter Screen -->
    <div id="letter-container">
      <div class="letter-window">
        <h1 id="letter-title">Will you go on a date with me????</h1>

        <img src="cat_heart.gif" class="cat" id="letter-cat" />

        <div class="buttons" id="letter-buttons">
          <img src="yes.png" class="btn yes-btn" alt="Yes" />

          <div class="no-wrapper">
            <img src="no.png" class="btn no-btn" alt="No" />
          </div>
        </div>

        <div id="final-text" class="final-text" style="display: none">
  <strong>Yay! Choose a slot:</strong>
  <div style="display: flex; gap: 10px; margin-top: 10px;">
    <a href="https://www.tgv.com.my/" target="_blank" style="text-decoration: none; color: inherit;">
      <button class="pixel-btn">Pavi BJ (Deluxe) - 1:30 PM</button>
    </a>
    <a href="https://www.gsc.com.my/" target="_blank" style="text-decoration: none; color: inherit;">
      <button class="pixel-btn">Midvalley (Atmos) - 12:50 PM</button>
    </a>
  </div>
</div>
     
    <script src="script.js"></script>
  </body>
</html>
